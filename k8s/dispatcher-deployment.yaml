apiVersion: apps/v1
kind: Deployment
metadata:
  name: convoyia-dispatcher
  namespace: convoyia
  labels:
    app: convoyia-dispatcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: convoyia-dispatcher
  template:
    metadata:
      labels:
        app: convoyia-dispatcher
    spec:
      containers:
        - name: convoyia-dispatcher
          image: goweyy/convoyia-dispatcher:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: convoyia-config
            - secretRef:
                name: convoyia-secrets
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: convoyia-dispatcher
  namespace: convoyia
spec:
  selector:
    app: convoyia-dispatcher
  ports:
    - port: 80
      targetPort: 8081
