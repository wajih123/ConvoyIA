# SECRETS — PLACEHOLDERS ONLY — DO NOT COMMIT REAL VALUES
# Replace all "PLACEHOLDER_*" values with real secrets managed via Vault or Sealed Secrets
apiVersion: v1
kind: Secret
metadata:
  name: convoyia-secrets
  namespace: convoyia
type: Opaque
stringData:
  DB_USER: "PLACEHOLDER_DB_USER"
  DB_PASSWORD: "PLACEHOLDER_DB_PASSWORD"
  STRIPE_API_KEY: "PLACEHOLDER_STRIPE_API_KEY"
  ANTHROPIC_API_KEY: "PLACEHOLDER_ANTHROPIC_API_KEY"
  HISCOX_API_KEY: "PLACEHOLDER_HISCOX_API_KEY"
  MINIO_ACCESS_KEY: "PLACEHOLDER_MINIO_ACCESS_KEY"
  MINIO_SECRET_KEY: "PLACEHOLDER_MINIO_SECRET_KEY"
